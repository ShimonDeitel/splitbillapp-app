name: Splitbill
options:
  bundleIdPrefix: com.shimondeitel.splitbillapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Splitbill:
    type: application
    platform: iOS
    sources:
      - path: Splitbill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splitbillapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Splitbill/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SplitbillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SplitbillTests
      - path: Splitbill.storekit
    dependencies:
      - target: Splitbill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splitbillapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SplitbillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SplitbillUITests
    dependencies:
      - target: Splitbill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splitbillapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Splitbill:
    build:
      targets:
        Splitbill: all
        SplitbillTests: [test]
        SplitbillUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Splitbill.storekit
    test:
      config: Debug
      storeKitConfiguration: Splitbill.storekit
      targets:
        - SplitbillTests
        - SplitbillUITests
    archive:
      config: Release
